name: Binance Square Post

on:
  schedule:
    - cron: '0 9 * * *'  # daily at 09:00 UTC
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Run script and capture output
        id: runscript
        env:
          BINANCE_SQUARE_API_KEY: ${{ secrets.BINANCE_SQUARE_API_KEY }}
        run: |
          python3 post.py | tee output.txt
      - name: Extract posted URLs
        id: extract
        run: |
          urls=$(grep -Eo 'https://www\.binance\.com/square/post/[A-Za-z0-9]+' output.txt | tr '\n' ' ')
          echo "urls=$urls" >> $GITHUB_OUTPUT
      - name: Notify via GitHub Issue
        if: steps.extract.outputs.urls != ''
        uses: actions/github-script@v7
        with:
          script: |
            const urls = `${{ steps.extract.outputs.urls }}`.trim().split(/\s+/).filter(Boolean);
            if (urls.length) {
              const body = "✅ Posted Binance Square items:\n" + urls.map(u => `- ${u}`).join("\n");
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Binance Square posts - ${new Date().toISOString()}`,
                body: body,
              });
            }

